server {
    listen 80;
    listen [::]:80;
    
    server_name techpro.local localhost;
    
    root /var/www/techpro;
    index index.html;
    
    access_log /var/log/nginx/techpro/access.log;
    error_log /var/log/nginx/techpro/error.log;
    
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
    
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    
    autoindex off;
    
    client_max_body_size 10M;
    
    location / {
        try_files $uri $uri/ =404;
    }
    
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
    
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }
}
